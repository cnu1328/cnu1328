name: Update GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=cnu1328&show_icons=true&theme=tokyonight&hide_border=true
          path: output/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=cnu1328&layout=compact&theme=tokyonight&hide_border=true&langs_count=8
          path: output/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit stats cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/stats.svg output/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update GitHub stats cards"
          git push
